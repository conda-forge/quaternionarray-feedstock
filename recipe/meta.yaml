{% set name = "quaternionarray" %}
{% set version = "0.6.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/quaternionarray-{{ version }}.tar.gz
  sha256: e8bd4c4bcdff901dc34a702269c9b48cb354dea202784783d88789d024329dbb

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - numpy

test:
  imports:
    - quaternionarray
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://github.com/zonca/quaternionarray/
  summary: Python package for fast quaternion arrays math
  license: GPL-3.0-only
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - ickc
